name: Integration Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight

jobs:
  integration:
    strategy:
      matrix:
        ubuntu_version: [22.04, 24.04, 26.04]
      fail-fast: true
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.integration
          load: true
          tags: dot-files-test:${{ matrix.ubuntu_version }}
          build-args: UBUNTU_VERSION=${{ matrix.ubuntu_version }}

      - name: Run integration tests
        run: |
          docker run --rm dot-files-test:${{ matrix.ubuntu_version }} \
            bash -c "bats tests/clean_install.bats"
